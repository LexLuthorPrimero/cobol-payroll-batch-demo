name: COBOL CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol
      - name: Ejecutar pruebas COBOL
        run: ./test.sh

  super-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Super-Linter (modo permisivo)
        uses: super-linter/super-linter@v7
        env:
          # Desactivamos todo por defecto...
          VALIDATE_ALL_CODEBASE: false
          # Activamos SOLO lo que nos interesa corregir
          VALIDATE_BASH: true
          VALIDATE_MARKDOWN: true
          # Desactivamos explícitamente lo que no queremos que falle
          VALIDATE_CHECKOV: false
          VALIDATE_GITHUB_ACTIONS: false
          VALIDATE_GITLEAKS: false
          VALIDATE_JSCPD: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_SHELL_SHFMT: true   # Lo queremos pasar
          VALIDATE_MARKDOWN_PRETTIER: false  # Usamos markdownlint normal
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
